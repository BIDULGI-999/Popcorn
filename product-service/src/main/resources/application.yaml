server:
  port: 8300

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5432/popcorn   # DB 명
    driverClassName: org.postgresql.Driver
    username: postgres    # 본인 계정
    password: postgres    # 본인 비밀번호
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      port: 6379
      host: localhost